<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DART GENXL</title>
    
    <!-- ============================================ -->
    <!-- FARCASTER FRAME v2 META TAGS                 -->
    <!-- ============================================ -->
    <meta property="fc:frame" content="vNext" />
    <meta property="fc:frame:image" content="https://ivxxbeats.github.io/dartgenxl-v1/previews/1.png" />
    <meta property="fc:frame:image:aspect_ratio" content="1:1" />
    <meta property="fc:frame:input:text" content="Enter token ID (1-9999)" />
    <meta property="fc:frame:post_url" content="https://dartgenxl-snap.ivxxbeats.workers.dev/frame" />
    
    <!-- Button 1: Live Viewer -->
    <meta property="fc:frame:button:1" content="🎨 LIVE VIEWER" />
    <meta property="fc:frame:button:1:action" content="link" />
    <meta property="fc:frame:button:1:target" content="https://ivxxbeats.github.io/dartgenxl-v1/?tid={tid}" />
    
    <!-- Button 2: Random Token -->
    <meta property="fc:frame:button:2" content="🎲 RANDOM" />
    <meta property="fc:frame:button:2:action" content="post" />
    
    <!-- Button 3: About -->
    <meta property="fc:frame:button:3" content="⚡ ABOUT" />
    <meta property="fc:frame:button:3:action" content="link" />
    <meta property="fc:frame:button:3:target" content="https://ivxxbeats.github.io/dartgenxl-v1/about.html" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, monospace;
            padding: 20px;
        }
        .container {
            background: #111116;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 720px;
            width: 100%;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            width: 100%;
            height: auto;
            background: #050508;
        }
        .info-panel {
            margin-top: 16px;
            background: #0d0d12;
            border-radius: 16px;
            padding: 14px;
        }
        .traits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 8px;
        }
        .trait-item {
            font-size: 10px;
            color: #8888aa;
            font-family: monospace;
        }
        .trait-item span:first-child { color: #666688; }
        .trait-item span:last-child { color: #e8e8f0; font-weight: 500; }
        .controls {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        input, button {
            background: #0d0d12;
            color: #e8e8f0;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
        }
        button:hover {
            background: #1a1a24;
            border-color: #aa88ff;
        }
        .status {
            margin-top: 14px;
            font-size: 9px;
            color: #666688;
            text-align: center;
        }
        .cursor {
            display: inline-block;
            width: 6px;
            height: 10px;
            background: #aa88ff;
            animation: blink 1s step-end infinite;
            margin-left: 4px;
        }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
        .preview-badge {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: #ffaa5520;
            color: #ffaa55;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="artCanvas" width="640" height="640"></canvas>
        
        <div class="info-panel">
            <div class="traits-grid" id="traitsGrid">
                <div class="trait-item"><span>ENGINE:</span> <span id="traitEngine">—</span></div>
                <div class="trait-item"><span>VARIANT:</span> <span id="traitEngineVar">—</span></div>
                <div class="trait-item"><span>RARITY:</span> <span id="traitRarity">—</span></div>
                <div class="trait-item"><span>ARCHETYPE:</span> <span id="traitArchetype">—</span></div>
                <div class="trait-item"><span>ANCHOR:</span> <span id="traitAnchor">—</span></div>
                <div class="trait-item"><span>DRIVER:</span> <span id="traitDriver">—</span></div>
                <div class="trait-item"><span>SPATIAL:</span> <span id="traitSpatial">—</span></div>
                <div class="trait-item"><span>CANONICAL INT:</span> <span id="traitCanonicalInt">—</span></div>
            </div>
        </div>
        
        <div class="controls">
            <input type="text" id="tokenInput" placeholder="TOKEN ID" value="1">
            <input type="text" id="hashInput" placeholder="TX HASH (optional)" value="0xframe">
            <button id="renderBtn">⟳ RENDER</button>
            <button id="randomBtn">🎲 RANDOM</button>
        </div>
        
        <div class="status" id="status">
            DART GENXL READY <span class="cursor"></span>
        </div>
    </div>
    <div class="preview-badge">⚡ PREVIEW MODE</div>
    
    <script src="engine.js"></script>
    <script>
        // ============================================================
        // DART GENXL FRAME v2 - Live Viewer
        // ============================================================
        
        const canvas = document.getElementById('artCanvas');
        const tokenInput = document.getElementById('tokenInput');
        const hashInput = document.getElementById('hashInput');
        const renderBtn = document.getElementById('renderBtn');
        const randomBtn = document.getElementById('randomBtn');
        const statusDiv = document.getElementById('status');
        
        // Check if this is a preview (frame) request
        const urlParams = new URLSearchParams(window.location.search);
        const isPreview = urlParams.get('preview') === 'true';
        const tokenId = urlParams.get('tid') || urlParams.get('tokenId') || '1';
        
        if (isPreview) {
            document.body.classList.add('preview-mode');
            statusDiv.innerHTML = `PREVIEW MODE — TOKEN ${tokenId} <span class="cursor"></span>`;
        }
        
        tokenInput.value = tokenId;
        
        // Preview seed function (different from mint)
        function getPreviewSeed(tokenId) {
            const combined = `preview_snap_${tokenId}`;
            let hash = 0;
            for (let i = 0; i < combined.length; i++) {
                hash = ((hash << 5) - hash) + combined.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }
        
        function updateTraitsUI(result) {
            if (!result || !result.traits) return;
            const t = result.traits;
            document.getElementById('traitEngine').textContent = t.engineType || '?';
            document.getElementById('traitEngineVar').textContent = t.engineVariant || '?';
            document.getElementById('traitRarity').textContent = t.rarityClass || '?';
            document.getElementById('traitArchetype').textContent = t.archetype || '?';
            document.getElementById('traitAnchor').textContent = t.anchorForm || '?';
            document.getElementById('traitDriver').textContent = t.primaryDriver || '?';
            document.getElementById('traitSpatial').textContent = t.spatialBehavior || '?';
            document.getElementById('traitCanonicalInt').textContent = result.canonicalIntensity ? result.canonicalIntensity.toFixed(3) : '—';
        }
        
        function renderArtwork() {
            const tokenIdVal = tokenInput.value.trim() || '1';
            const txHash = hashInput.value.trim() || '0xframe';
            
            statusDiv.innerHTML = `RENDERING TOKEN ${tokenIdVal}... <span class="cursor"></span>`;
            
            try {
                let result;
                if (isPreview) {
                    // Use preview seed for frame previews
                    const previewSeed = getPreviewSeed(tokenIdVal);
                    // For preview, we'd need a custom render function
                    // Fall back to canonical for now
                    result = DartHLGEN.renderCanonical(tokenIdVal, txHash);
                } else {
                    result = DartHLGEN.renderCanonical(tokenIdVal, txHash);
                }
                
                if (!result || !result.pixels) throw new Error("Invalid render");
                DartHLGEN.drawToCanvas(canvas, result);
                updateTraitsUI(result);
                
                statusDiv.innerHTML = `TOKEN ${tokenIdVal} — ${result.traits.engineType} · ${result.traits.rarityClass} <span class="cursor"></span>`;
            } catch(e) {
                console.error("Render error:", e);
                statusDiv.innerHTML = `ERROR: ${e.message.substring(0, 40)} <span class="cursor"></span>`;
            }
        }
        
        function randomToken() {
            const randomId = Math.floor(Math.random() * 9999) + 1;
            tokenInput.value = randomId;
            renderArtwork();
            
            // Update URL without reload
            const url = new URL(window.location);
            url.searchParams.set('tid', randomId);
            window.history.pushState({}, '', url);
        }
        
        renderBtn.onclick = renderArtwork;
        randomBtn.onclick = randomToken;
        tokenInput.onkeypress = (e) => { if (e.key === 'Enter') renderArtwork(); };
        
        // Initial render
        renderArtwork();
        
        console.log("Dart GenXL Frame v2 Ready - Preview mode:", isPreview);
    </script>
</body>
</html>
