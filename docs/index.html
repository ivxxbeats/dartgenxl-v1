<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dart HLGEN - Generative Art Engine V2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(233, 69, 96, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(0, 255, 255, 0.05) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Fira Code', monospace;
            padding: 20px;
        }
        
        .container {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(233, 69, 96, 0.2);
        }
        
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            height: auto;
            max-width: 640px;
        }
        
        canvas:hover {
            transform: scale(1.02);
        }
        
        .info-panel {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            padding: 15px;
            border-left: 3px solid #e94560;
        }
        
        .traits {
            color: #e94560;
            font-size: 11px;
            line-height: 1.6;
            word-break: break-word;
            font-family: monospace;
        }
        
        .traits span {
            color: #00ffff;
        }
        
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        input, button {
            background: #1a1a2e;
            color: #e94560;
            border: 1px solid #e94560;
            padding: 8px 16px;
            font-family: monospace;
            border-radius: 6px;
        }
        
        input {
            background: #0a0a0f;
        }
        
        button {
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #e94560;
            color: #1a1a2e;
        }
        
        .status {
            margin-top: 10px;
            font-size: 10px;
            color: #666;
            text-align: center;
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 10px;
            }
            .traits {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="artCanvas" width="640" height="640"></canvas>
        <div class="info-panel">
            <div class="traits" id="info">Loading engine...</div>
        </div>
        <div class="controls">
            <input type="text" id="tokenInput" placeholder="Token ID" value="1">
            <input type="text" id="hashInput" placeholder="Tx Hash" value="0xabc123">
            <button id="renderBtn">🔄 Render</button>
            <button id="randomBtn">🎲 Random</button>
            <button id="freezeBtn">❄️ Freeze</button>
        </div>
        <div class="status" id="status">Live mode always active</div>
    </div>
    
    <script src="engine.js"></script>
    <script>
        console.log("Page loaded, waiting for engine...");
        
        const canvas = document.getElementById('artCanvas');
        const infoDiv = document.getElementById('info');
        const statusDiv = document.getElementById('status');
        const tokenInput = document.getElementById('tokenInput');
        const hashInput = document.getElementById('hashInput');
        const renderBtn = document.getElementById('renderBtn');
        const randomBtn = document.getElementById('randomBtn');
        const freezeBtn = document.getElementById('freezeBtn');
        
        let currentSession = null;
        
        function stopCurrentSession() {
            if (currentSession && currentSession.stop) {
                currentSession.stop();
                currentSession = null;
            }
        }
        
        // Render canonical (freeze mode)
        function renderCanonicalMode() {
            stopCurrentSession();
            const tokenId = tokenInput.value;
            const txHash = hashInput.value || '0xfallback';
            
            statusDiv.innerHTML = '❄️ Freeze mode - static render';
            
            try {
                const result = DartHLGEN.renderCanonical(tokenId, txHash);
                DartHLGEN.drawToCanvas(canvas, result);
                
                const t = result.traits;
                infoDiv.innerHTML = 
                    `<span>🎨 ${t.engineType}</span> · <span>${t.rarityClass}</span><br>` +
                    `<span>📐 ${t.archetype}</span> · <span>${t.anchorForm}</span><br>` +
                    `<span>⚡ ${t.primaryDriver}</span> · <span>${t.failureMode}</span><br>` +
                    `${t.anomalyClass ? '<span>🌀 ' + t.anomalyClass + '</span>' : '<span>✨ No Anomaly</span>'} · ` +
                    `<span>🎯 ES:${result.eventScore}</span><br>` +
                    `<span>🔥 ${result.stabilityClass || '?'}</span> · ` +
                    `<span>⚡ ${result.intensityBias || '?'}</span> · ` +
                    `<span>🌀 ${result.activationType || '?'}</span>`;
            } catch(e) {
                console.error("Render error:", e);
                infoDiv.innerHTML = `❌ Error: ${e.message}`;
                statusDiv.innerHTML = "Error rendering";
            }
        }
        
        // Start live mode (ALWAYS ON by default)
        function startLiveMode() {
            stopCurrentSession();
            const tokenId = tokenInput.value;
            const txHash = hashInput.value || '0xfallback';
            
            statusDiv.innerHTML = '🎬 Live mode - animated';
            
            try {
                const session = DartHLGEN.createLiveSession(tokenId, txHash);
                session.startAnimation(canvas);
                session.updateInfoPanel();
                currentSession = session;
                
                // Override updateInfoPanel to use our info div
                session.updateInfoPanel = () => {
                    const t = session.getCanonical().traits;
                    const canonical = session.getCanonical();
                    infoDiv.innerHTML = 
                        `<span>🎨 ${t.engineType}</span> · <span>${t.rarityClass}</span><br>` +
                        `<span>📐 ${t.archetype}</span> · <span>${t.anchorForm}</span><br>` +
                        `<span>⚡ ${t.primaryDriver}</span> · <span>${t.failureMode}</span><br>` +
                        `${t.anomalyClass ? '<span>🌀 ' + t.anomalyClass + '</span>' : '<span>✨ No Anomaly</span>'} · ` +
                        `<span>🎯 ES:${canonical.eventScore || 0}</span><br>` +
                        `<span>🔥 ${canonical.stabilityClass || '?'}</span> · ` +
                        `<span>⚡ ${canonical.intensityBias || '?'}</span> · ` +
                        `<span>🌀 ${canonical.activationType || '?'}</span>`;
                };
                session.updateInfoPanel();
            } catch(e) {
                console.error("Live mode error:", e);
                infoDiv.innerHTML = `❌ Error: ${e.message}`;
                statusDiv.innerHTML = "Error starting live mode";
            }
        }
        
        // Random token generator
        function randomToken() {
            const randomId = Math.floor(Math.random() * 10000);
            const randomHash = '0x' + Math.random().toString(36).substring(2, 10);
            tokenInput.value = randomId;
            hashInput.value = randomHash;
            
            // Update URL without reload
            const url = new URL(window.location);
            url.searchParams.set('tid', randomId);
            url.searchParams.set('h', randomHash);
            window.history.pushState({}, '', url);
            
            // Restart live mode with new token
            startLiveMode();
        }
        
        // Check if engine loaded
        function checkEngine() {
            if (typeof DartHLGEN !== 'undefined') {
                console.log("Engine loaded v" + DartHLGEN.version);
                statusDiv.innerHTML = "Engine v" + DartHLGEN.version + " - Live mode active";
                
                // Get URL params
                const params = new URLSearchParams(window.location.search);
                const tid = params.get('tid') || params.get('tokenId');
                const h = params.get('h') || params.get('txHash');
                const freeze = params.get('freeze') === 'true';
                
                if (tid) tokenInput.value = tid;
                if (h) hashInput.value = h;
                
                // ALWAYS LIVE MODE - Freeze parameter overrides to canonical
                if (freeze) {
                    renderCanonicalMode();
                } else {
                    startLiveMode();
                }
            } else {
                setTimeout(checkEngine, 100);
            }
        }
        
        // Button handlers
        renderBtn.onclick = () => {
            // Render button now restarts live mode with new values
            startLiveMode();
        };
        
        randomBtn.onclick = randomToken;
        
        freezeBtn.onclick = () => {
            // Toggle freeze mode
            const url = new URL(window.location);
            if (url.searchParams.get('freeze') === 'true') {
                url.searchParams.delete('freeze');
                startLiveMode();
            } else {
                url.searchParams.set('freeze', 'true');
                renderCanonicalMode();
            }
            window.history.pushState({}, '', url);
        };
        
        // Start
        checkEngine();
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                randomToken();
            }
            if (e.key === 'r' || e.key === 'R') {
                startLiveMode();
            }
            if (e.key === 'f' || e.key === 'F') {
                freezeBtn.click();
            }
        });
        
        // Debug helper
        window.debugEngine = () => {
            if (typeof DartHLGEN !== 'undefined' && DartHLGEN.DEBUG) {
                console.log(DartHLGEN.DEBUG.status());
            } else {
                console.log("Engine not loaded or DEBUG not available");
            }
        };
        
        console.log("Live mode always on - use ?freeze=true for static render");
    </script>
</body>
</html>
